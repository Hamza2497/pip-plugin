<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIP — Dashboard</title>
<style>
  :root{
    --bg:#080809; --panel:#0e0e11; --panel2:#141418; --line:rgba(255,255,255,.08);
    --txt:#e7e7ea; --dim:#9a9aa3; --faint:#6b6b74;
    --green:#22c55e; --amber:#f59e0b; --blue:#38bdf8; --gray:#52525b; --red:#ef4444;
    --edge:rgba(255,255,255,.11); --edge-hi:rgba(255,255,255,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}
  #app{display:grid;grid-template-rows:auto 1fr;height:100%}
  header{display:flex;align-items:center;gap:18px;padding:12px 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0c0c0f,#08080a)}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand b{font-size:19px;letter-spacing:.5px}
  .brand span{color:var(--dim);font-size:12px}
  .stats{display:flex;gap:20px;margin-left:6px}
  .stat{display:flex;flex-direction:column;line-height:1.15}
  .stat .n{font-size:17px;font-weight:600}
  .stat .l{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px}
  .search{margin-left:auto;position:relative}
  .search input{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:7px 11px 7px 30px;color:var(--txt);width:210px;outline:none}
  .search input:focus{border-color:rgba(56,189,248,.5)}
  .search svg{position:absolute;left:9px;top:8px;opacity:.5}
  main{display:grid;grid-template-columns:244px 1fr;min-height:0;transition:grid-template-columns .2s ease}
  main.lcollapse{grid-template-columns:0 1fr}
  main.lcollapse aside{padding:0;border-right-color:transparent;overflow:hidden}
  .navtoggle{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;color:var(--dim);flex:none}
  .navtoggle:hover{background:var(--panel2);color:var(--txt)}
  .navtoggle svg{width:18px;height:18px}
  /* right pop-out nav: concept queue + learning plan (project view only) */
  .rnav-toggle{position:absolute;top:12px;right:14px;z-index:6;background:rgba(18,18,24,.72);border:1px solid var(--line)}
  .lnav-toggle{position:absolute;top:12px;left:14px;z-index:9;background:rgba(18,18,24,.72);border:1px solid var(--line)}
  .rightnav{position:absolute;top:0;right:0;bottom:0;width:292px;background:var(--panel);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .22s ease;z-index:8;overflow-y:auto;padding:14px 14px 22px}
  .rightnav.open{transform:translateX(0);box-shadow:-18px 0 44px rgba(0,0,0,.5)}
  .rnav-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .rnav-head .t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rnav-x{width:26px;height:26px;border-radius:6px;color:var(--dim);display:flex;align-items:center;justify-content:center;flex:none}
  .rnav-x:hover{background:var(--panel2);color:var(--txt)}
  .rsec{margin-bottom:20px}
  .rsec h4{margin:0 0 3px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .rsec h4 .cnt{margin-left:auto;font-size:10px;color:var(--faint);letter-spacing:0}
  .rsec .sub{font-size:10.5px;color:var(--faint);margin:0 0 7px}
  .rbar{height:5px;border-radius:4px;background:#202027;overflow:hidden;margin:0 0 11px}
  .rbar>i{display:block;height:100%;background:linear-gradient(90deg,#16a34a,#22c55e)}
  .rrow{width:100%;display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;text-align:left}
  .rrow:hover{background:var(--panel2)}
  .rrow > i{width:8px;height:8px;border-radius:50%;flex:none}
  .rrow .rnm{font-size:12.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rrow .rsc{font-size:10.5px;color:var(--faint);flex:none}
  .rempty{font-size:12px;color:var(--faint);padding:4px 8px}
  .rpart{width:100%;display:flex;align-items:center;gap:7px;margin:13px 0 3px;padding:5px 8px;border-radius:7px;text-align:left}
  .rpart:hover{background:var(--panel2)}
  .rpart-g:first-child .rpart{margin-top:2px}
  .rpart .chev{font-size:9px;color:var(--faint);transition:transform .15s}
  .rpart-g.collapsed .chev{transform:rotate(-90deg)}
  .rpart .pn{font-size:11px;font-weight:600;color:#a78bfa;letter-spacing:.2px}
  .rpart .pc{margin-left:auto;font-size:10px;color:var(--faint)}
  .rpart-g.collapsed .rpart-body{display:none}
  /* auto-refresh chip */
  .refresh{display:flex;align-items:center;gap:6px;margin-left:10px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;color:var(--dim);font-size:11px}
  .refresh:hover{background:var(--panel2);color:var(--txt)}
  .refresh .rdot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.15)}
  .refresh.off{opacity:.6}
  .refresh.off .rdot{background:var(--faint);box-shadow:none}

  /* sidebar groups */
  aside{border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:8px}
  .group{margin-bottom:6px}
  .group-h{width:100%;display:flex;align-items:center;gap:8px;padding:9px 8px;border-radius:8px;
    font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
  .group-h:hover{background:var(--panel2)}
  .group-h .chev{transition:transform .15s;font-size:10px;color:var(--faint)}
  .group.collapsed .chev{transform:rotate(-90deg)}
  .group.collapsed .group-body{display:none}
  .group-h .cnt{margin-left:auto;font-size:10px;color:var(--faint);letter-spacing:0}
  .group-body{padding:2px 2px 6px}
  .card{border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px;
    background:var(--panel2);transition:border-color .15s}
  .card:hover{border-color:rgba(255,255,255,.18)}
  .card.active{border-color:rgba(56,189,248,.55);box-shadow:0 0 0 1px rgba(56,189,248,.25) inset}
  .card .nm{font-weight:600;font-size:13px}
  .card .bl{color:var(--faint);font-size:10.5px;margin-top:2px}
  .card.proj .nm{display:flex;align-items:center;gap:7px}
  .card.proj .dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
  .bar{height:5px;border-radius:4px;background:#202027;overflow:hidden;margin-top:8px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#16a34a,#22c55e)}
  .bar-l{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px}

  /* canvas */
  .canvas-wrap{position:relative;overflow:hidden;background:
     radial-gradient(1200px 600px at 70% -10%, #101019 0%, transparent 60%), var(--bg)}
  #stars{position:absolute;inset:0;pointer-events:none}
  .tree-head{position:absolute;top:12px;left:56px;z-index:5;pointer-events:none}
  .tree-head h2{margin:0;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .tree-head .kind{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#0a0a0a;
    background:var(--blue);border-radius:5px;padding:2px 7px;font-weight:700}
  .tree-head .kind.stack{background:#a78bfa}
  .tree-head p{margin:3px 0 0;color:var(--dim);font-size:11.5px}
  svg#tree{width:100%;height:100%;display:block;cursor:grab}
  svg#tree.grabbing{cursor:grabbing}
  .edge{fill:none;stroke:var(--edge);stroke-width:.9px;transition:stroke .12s}
  .edge.hi{stroke:var(--edge-hi);stroke-width:1.4px}
  .node{cursor:pointer}
  .node .ring{stroke-width:2px;transition:filter .12s}
  .node .ico{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:central}
  .node .lbl{text-anchor:middle;fill:var(--txt);font-size:11px}
  .node .sub{text-anchor:middle;fill:var(--faint);font-size:9.5px}
  .node.sel .ring{filter:drop-shadow(0 0 7px currentColor)}
  .node.dim{opacity:.16}
  .badge circle{fill:#1b1b20;stroke:rgba(255,255,255,.25);stroke-width:1px}
  .badge text{fill:var(--txt);font-size:9px;font-weight:700;text-anchor:middle;dominant-baseline:central}
  .badge.sbadge circle{stroke:#a78bfa}
  .badge.sbadge text{fill:#c4b5fd;font-size:10px}
  .syncbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:9;display:flex;align-items:center;gap:10px;
    background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.45);color:#bbf7d0;border-radius:9px;padding:7px 12px;font-size:12px;backdrop-filter:blur(4px);
    opacity:0;visibility:hidden;pointer-events:none;transition:opacity .35s ease,visibility .35s ease}
  .syncbar.show{opacity:1;visibility:visible;pointer-events:auto}
  .syncbar button{border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:3px 10px;font-size:11px;color:#e7e7ea}
  .syncbar button:hover{border-color:#22c55e}
  .markbtn{margin-top:14px;display:inline-block;border:1px solid rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#bbf7d0;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:600}
  .markbtn:hover{border-color:#22c55e}
  .markbtn.unmark{margin-left:10px;border-color:rgba(255,255,255,.2);background:transparent;color:var(--dim)}
  .markbtn.unmark:hover{border-color:rgba(255,255,255,.4)}

  .zoom{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:6}
  .zoom button{width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);
    font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
  .zoom button:hover{border-color:rgba(255,255,255,.25)}
  .legend{position:absolute;left:16px;bottom:14px;display:flex;gap:13px;z-index:6;font-size:11px;color:var(--dim);
    background:rgba(8,8,10,.6);border:1px solid var(--line);border-radius:8px;padding:6px 10px;backdrop-filter:blur(4px)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

  .detail{position:absolute;left:0;right:0;bottom:0;z-index:8;background:linear-gradient(180deg,#0d0d11,#0a0a0d);
    border-top:1px solid rgba(255,255,255,.12);box-shadow:0 -18px 40px rgba(0,0,0,.5);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);max-height:64%;overflow-y:auto}
  .detail.open{transform:translateY(0)}
  .detail-in{padding:16px 20px 22px}
  .detail .x{position:absolute;right:14px;top:12px;color:var(--dim);font-size:18px}
  .dt-top{display:flex;align-items:flex-start;gap:13px}
  .dt-dot{width:14px;height:14px;border-radius:50%;margin-top:4px;flex:none}
  .dt-title{font-size:17px;font-weight:600}
  .dt-meta{color:var(--dim);font-size:12px;margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--dim)}
  .chip.grade{color:#0a0a0a;font-weight:700;border:none}
  .sec{margin-top:16px}
  .sec h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
  .prov{display:grid;gap:8px}
  .prov-row{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:9px;
    padding:9px 12px;background:var(--panel2);cursor:pointer}
  .prov-row:hover{border-color:rgba(56,189,248,.4)}
  .prov-row .pj{font-weight:600;min-width:130px}
  .prov-row .gr{font-weight:700;border-radius:6px;padding:2px 8px;font-size:12px;color:#0a0a0a}
  .prov-row .cd{color:var(--faint);font-size:11.5px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .prov-row .dt{margin-left:auto;color:var(--faint);font-size:11px}
  .multi{font-size:11.5px;color:var(--blue);margin-top:8px}
  .prereqs{display:flex;flex-wrap:wrap;gap:7px}
  .prq{font-size:11.5px;border:1px solid var(--line);border-radius:7px;padding:4px 9px;cursor:pointer;color:var(--txt)}
  .prq:hover{border-color:rgba(56,189,248,.5)}
  .prq i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .empty{color:var(--faint);font-size:12px}

  .howto{width:100%;display:flex;align-items:center;gap:9px;padding:11px;margin-bottom:8px;border-radius:9px;
    border:1px solid var(--line);background:linear-gradient(180deg,#15131d,#101016);color:var(--txt);font-weight:600;font-size:13px}
  .howto:hover{border-color:rgba(167,139,250,.5)}
  .howto.active{border-color:rgba(167,139,250,.7);box-shadow:0 0 0 1px rgba(167,139,250,.3) inset}
  .howto .ic{width:20px;height:20px;border-radius:6px;background:#a78bfa;color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none}
  .help{display:none;position:absolute;inset:0;overflow-y:auto;padding:26px 30px 44px;z-index:7}
  .canvas-wrap.mode-help .help{padding-left:56px}
  .canvas-wrap.mode-help #tree,.canvas-wrap.mode-help .legend,.canvas-wrap.mode-help .zoom,.canvas-wrap.mode-help .tree-head,.canvas-wrap.mode-help .detail{display:none}
  .canvas-wrap.mode-help .help{display:block}
  .help h1{font-size:20px;margin:0 0 5px}
  .help .lede{color:var(--dim);font-size:13px;margin:0;max-width:700px;line-height:1.6}
  .help .rule{display:block;margin:14px 0 4px;font-size:12.5px;color:#fca5a5;border:1px solid rgba(239,68,68,.35);background:rgba(239,68,68,.08);border-radius:8px;padding:9px 13px;max-width:700px}
  .help h3{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin:26px 0 12px;border-bottom:1px solid var(--line);padding-bottom:7px}
  .help h3.key{color:#a78bfa;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:4px;border-bottom-color:rgba(167,139,250,.45)}
  .help details.fold{margin:26px 0 0}
  .help summary.foldh{list-style:none;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);border-bottom:1px solid var(--line);padding-bottom:7px;display:flex;align-items:center;gap:8px}
  .help summary.foldh::-webkit-details-marker{display:none}
  .help summary.foldh:before{content:'▸';font-size:10px;color:#a78bfa}
  .help details[open] summary.foldh:before{content:'▾'}
  .help summary.foldh:hover{color:var(--dim)}
  .help summary.foldh .hint{margin-left:auto;font-size:10px;text-transform:none;letter-spacing:0;color:var(--faint)}
  .help details.fold .steps{margin-top:12px}
  .help .cmd{display:grid;grid-template-columns:210px 1fr;gap:16px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .help .cmd .c{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#7dd3fc}
  .help .cmd .c em{display:block;color:var(--faint);font-style:normal;font-size:11px;margin-top:4px}
  .help .cmd .d{font-size:13px;color:var(--txt);line-height:1.55}
  .help .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:2px}
  .help .tile{border:1px solid var(--line);border-radius:9px;padding:11px 13px;background:var(--panel2)}
  .help .tile b{font-size:12.5px}
  .help .tile p{margin:5px 0 0;font-size:12px;color:var(--dim);line-height:1.5}
  .help .legendkey{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--dim);margin-top:6px}
  .help .legendkey i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .help ol{margin:4px 0 0;padding-left:20px}
  .help ol li{font-size:13px;margin:7px 0;line-height:1.5}
  .help code{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
  .help .steps{margin:4px 0 0;padding:0;list-style:none}
  .help .steps li{position:relative;padding:7px 0 7px 32px;font-size:13px;line-height:1.5}
  .help .steps li:before{counter-increment:s;content:counter(s);position:absolute;left:0;top:6px;width:21px;height:21px;border-radius:50%;background:#a78bfa;color:#0a0a0a;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .help .steps{counter-reset:s}
  .help .plan-eg{border:1px solid var(--line);border-radius:10px;padding:13px 16px;background:var(--panel2);margin-top:8px;max-width:720px}
  .help .plan-eg .pl{font-size:13px;margin-bottom:8px}
  .help .plan-eg .pl b{color:#7dd3fc}
  .help .part{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-top:1px solid rgba(255,255,255,.05)}
  .help .part .pn{min-width:140px;font-size:12.5px;font-weight:600;color:#a78bfa}
  .help .part .cs{display:flex;flex-wrap:wrap;gap:6px}
  .help .cpt{font-size:11.5px;border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--txt);background:#16161b}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><b>PIP</b><span>dashboard</span></div>
    <div class="stats" id="stats"></div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" placeholder="Search concepts…" autocomplete="off">
    </div>
    <button class="refresh" id="refreshBtn" title="Auto-refresh the dashboard (click to toggle)"><span class="rdot"></span><span id="refreshLbl">auto 5m</span></button>
  </header>
  <main>
    <aside>
      <button class="howto" id="howto"><span class="ic">?</span>How to use PIP</button>
      <div class="group collapsed" id="g-projects">
        <button class="group-h" data-g="g-projects"><span class="chev">▾</span>Projects<span class="cnt" id="cnt-proj"></span></button>
        <div class="group-body" id="projects"></div>
      </div>
      <div class="group collapsed" id="g-stacks">
        <button class="group-h" data-g="g-stacks"><span class="chev">▾</span>Stacks<span class="cnt" id="cnt-stack"></span></button>
        <div class="group-body" id="stacks"></div>
      </div>
    </aside>
    <div class="canvas-wrap">
      <canvas id="stars"></canvas>
      <div class="tree-head"><h2 id="treeName"></h2><p id="treeSub"></p></div>
      <svg id="tree"><g id="viewport"></g></svg>
      <div class="help" id="help"></div>
      <div class="syncbar" id="syncbar"></div>
      <div class="legend">
        <span><i style="background:var(--green)"></i>mastered</span>
        <span><i style="background:var(--amber)"></i>passed</span>
        <span><i style="background:var(--blue)"></i>in&nbsp;progress</span>
        <span><i style="background:var(--gray)"></i>ready</span>
        <span><i style="background:var(--red)"></i>locked</span>
      </div>
      <div class="zoom"><button id="zin">+</button><button id="zout">−</button><button id="zfit" title="fit">⤢</button></div>
      <div class="detail" id="detail"><div class="detail-in"><button class="x" id="dx">✕</button><div id="dbody"></div></div></div>
      <button class="navtoggle lnav-toggle" id="lnavToggle" title="Toggle sidebar" aria-label="Toggle sidebar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg></button>
      <button class="navtoggle rnav-toggle" id="rnavToggle" title="Learning plan" aria-label="Toggle learning plan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></svg></button>
      <aside class="rightnav" id="rightnav"></aside>
    </div>
  </main>
</div>

<script id="pip-data" type="application/json">
{
  "generatedAt": "2026-01-01",
  "user": "Example User",
  "stacks": [
    {
      "id": "web",
      "name": "Web · Example",
      "blurb": "HTTP API · auth · data · deploy"
    }
  ],
  "projects": [
    {
      "id": "demo-api",
      "name": "Demo API",
      "stacks": [
        "web"
      ],
      "concepts": [
        "http-basics",
        "routing",
        "validation",
        "auth",
        "db",
        "migrations",
        "testing",
        "deploy"
      ],
      "parts": [
        {
          "name": "Basics",
          "concepts": [
            "http-basics",
            "routing"
          ]
        },
        {
          "name": "API",
          "concepts": [
            "validation",
            "auth"

<script>
(function(){
  "use strict";
  const DATA = JSON.parse(document.getElementById('pip-data').textContent);
  const COLOR={mastered:'#22c55e',passed:'#f59e0b','in-progress':'#38bdf8',ready:'#52525b',locked:'#ef4444'};
  const byId={}; DATA.concepts.forEach(c=>byId[c.id]=c);
  const projName={}; DATA.projects.forEach(p=>projName[p.id]=p.name);

  // Marks made in this browser. `userMastered` = nodes shown green from a browser mark;
  // `userSynced` = those already copied to PIP. Pending (the banner) = marked − synced, so
  // you can mark several in a row and only the new ones show. On load, drop anything PIP has
  // already absorbed (selfMastered in the store) from both.
  const LS='pip_user_mastered', LS2='pip_user_synced';
  let userMastered=new Set(JSON.parse(localStorage.getItem(LS)||'[]').filter(id=>byId[id] && !byId[id].selfMastered));
  let userSynced=new Set(JSON.parse(localStorage.getItem(LS2)||'[]').filter(id=>userMastered.has(id)));
  function saveMarks(){ localStorage.setItem(LS,JSON.stringify([...userMastered])); localStorage.setItem(LS2,JSON.stringify([...userSynced])); }
  saveMarks();
  const isMarked=c=>userMastered.has(c.id)||c.selfMastered===true;

  function scores(learned){ return learned.map(l=>l.score).filter(s=>s!=null); }
  function avgScore(learned){ const s=scores(learned); return s.length?s.reduce((a,b)=>a+b,0)/s.length:null; }
  function fmtScore(s){ return Number.isInteger(s)?(''+s):s.toFixed(1); }
  function scoreColor(s){ return s>=9?'#22c55e':s>=6?'#f59e0b':'#38bdf8'; }
  function isDone(c){ if(isMarked(c))return true; if(!c.learnedIn.length)return false; const s=avgScore(c.learnedIn); return s===null||s>=6; }

  // score /10 → mastered 9–10 (or self-marked) · passed 6–8 · in-progress ≤5 · ready/locked if not learned
  function statusOf(c){
    if(isMarked(c)) return 'mastered';
    if(c.learnedIn.length){ const s=avgScore(c.learnedIn);
      if(s===null) return 'passed';
      if(s>=9) return 'mastered'; if(s>=6) return 'passed'; return 'in-progress'; }
    const locked=c.prereqs.some(pid=>{const p=byId[pid]; return p&&!isDone(p);});
    return locked?'locked':'ready';
  }

  // ---- view state: {mode:'stack'|'project', id} ----
  let viewMode='stack', viewId=DATA.stacks[0].id, selected=null;
  const view={x:60,y:30,k:1};
  const SVG='http://www.w3.org/2000/svg';

  // header
  function renderStats(){
    const all=DATA.concepts, mastered=all.filter(c=>statusOf(c)==='mastered').length;
    const xproj=all.filter(c=>c.learnedIn.length>1).length;
    const xstack=all.filter(c=>c.stacks.length>1).length;
    document.getElementById('stats').innerHTML=
      st(DATA.projects.length,'projects')+st(DATA.stacks.length,'stacks')+
      st(mastered+' / '+all.length,'mastered')+st(xproj,'cross-project')+st(xstack,'cross-stack');
    function st(n,l){return `<div class="stat"><span class="n">${n}</span><span class="l">${l}</span></div>`}
  }
  renderStats();

  // collapsible groups
  document.querySelectorAll('.group-h').forEach(h=>h.onclick=()=>document.getElementById(h.dataset.g).classList.toggle('collapsed'));

  // sidebar: projects
  function renderProjects(){
    document.getElementById('cnt-proj').textContent=DATA.projects.length;
    const wrap=document.getElementById('projects'); wrap.innerHTML='';
    DATA.projects.forEach(p=>{
      const scopeIds=new Set(p.concepts||[]);
      const inScope=DATA.concepts.filter(c=>scopeIds.has(c.id));
      const total=inScope.length||DATA.concepts.filter(c=>c.learnedIn.some(l=>l.project===p.id)).length;
      const mastered=inScope.filter(c=>statusOf(c)==='mastered').length;
      const stacks=p.stacks.map(s=>DATA.stacks.find(x=>x.id===s).name.split(' · ')[0]).join(', ');
      const d=document.createElement('div');
      d.className='card proj'+(viewMode==='project'&&viewId===p.id?' active':'');
      d.innerHTML=`<div class="nm"><span class="dot"></span>${p.name}</div>
        <div class="bl">${mastered}/${total} concepts · ${stacks}</div>`;
      d.onclick=()=>{viewMode='project';viewId=p.id;selected=null;closeDetail();document.querySelector('.canvas-wrap').classList.remove('mode-help');renderSidebar();layout();};
      wrap.appendChild(d);
    });
  }
  // sidebar: stacks
  function renderStacks(){
    document.getElementById('cnt-stack').textContent=DATA.stacks.length;
    const wrap=document.getElementById('stacks'); wrap.innerHTML='';
    DATA.stacks.forEach(s=>{
      const cs=DATA.concepts.filter(c=>c.stacks.includes(s.id));
      const m=cs.filter(c=>statusOf(c)==='mastered').length;
      const pct=cs.length?Math.round(m/cs.length*100):0;
      const d=document.createElement('div');
      d.className='card'+(viewMode==='stack'&&viewId===s.id?' active':'');
      d.innerHTML=`<div class="nm">${s.name}</div><div class="bl">${s.blurb}</div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="bar-l"><span>${m}/${cs.length} mastered</span><span>${pct}%</span></div>`;
      d.onclick=()=>{viewMode='stack';viewId=s.id;selected=null;closeDetail();document.querySelector('.canvas-wrap').classList.remove('mode-help');renderSidebar();layout();};
      wrap.appendChild(d);
    });
  }
  function renderSidebar(){ renderProjects(); renderStacks(); document.getElementById('howto').classList.toggle('active',viewMode==='help'); }

  // concepts in the current view
  function viewConcepts(){
    if(viewMode==='stack') return DATA.concepts.filter(c=>c.stacks.includes(viewId)); // full stack curriculum
    const proj=DATA.projects.find(p=>p.id===viewId);
    const base=(proj.concepts&&proj.concepts.length)?proj.concepts.slice()
               :DATA.concepts.filter(c=>c.learnedIn.some(l=>l.project===viewId)).map(c=>c.id);
    const set=new Set(base);
    // prerequisite closure: a concept's prereqs are always pulled in (even if not learnable here),
    // so no node is locked by a hidden prereq. Prereqs may appear without their dependents, never the reverse.
    const stk=[...set];
    while(stk.length){ const c=byId[stk.pop()]; if(!c)continue;
      c.prereqs.forEach(p=>{ if(!set.has(p)){ set.add(p); stk.push(p); } }); }
    return DATA.concepts.filter(c=>set.has(c.id));
  }

  // ---- layout ----
  const NODE_R=22, COL=152, ROW=128, PAD=70;
  let positioned=[];
  function layout(){
    const cs=viewConcepts(); const set=new Set(cs.map(c=>c.id)); const lvl={};
    function depth(id,seen){ if(lvl[id]!=null)return lvl[id];
      const ps=byId[id].prereqs.filter(p=>set.has(p)&&!seen.has(p));
      let d=0; ps.forEach(p=>{seen.add(p);d=Math.max(d,depth(p,seen)+1);seen.delete(p);}); return lvl[id]=d; }
    cs.forEach(c=>depth(c.id,new Set([c.id])));
    const rows={}; cs.forEach(c=>{(rows[lvl[c.id]]=rows[lvl[c.id]]||[]).push(c);});
    positioned=[];
    Object.keys(rows).map(Number).sort((a,b)=>a-b).forEach(L=>{
      const row=rows[L].sort((a,b)=>a.name.localeCompare(b.name)); const w=(row.length-1)*COL;
      row.forEach((c,i)=>positioned.push({c,x:PAD+i*COL-w/2,y:PAD+L*ROW}));
    });
    const isStack=viewMode==='stack';
    const obj=isStack?DATA.stacks.find(s=>s.id===viewId):DATA.projects.find(p=>p.id===viewId);
    document.getElementById('treeName').innerHTML=
      `<span class="kind ${isStack?'stack':''}">${isStack?'stack':'project'}</span>${obj.name}`;
    const m=positioned.filter(p=>statusOf(p.c)==='mastered').length;
    document.getElementById('treeSub').textContent= isStack
      ? `${positioned.length} concepts to master · ${m} done · ${positioned.length-m} remaining`
      : `${positioned.length} concepts · ${m} mastered — what you learned & can learn building ${obj.name}`;
    draw(); fit(); renderRightNav(); saveView();
  }
  let partCollapsed=new Set(JSON.parse(localStorage.getItem('pip.partcollapse')||'[]'));
  function saveView(){ try{ sessionStorage.setItem('pip.view',JSON.stringify({
    m:viewMode, v:viewId, s:selected,
    l:document.querySelector('main').classList.contains('lcollapse'),
    r:document.getElementById('rightnav').classList.contains('open') })); }catch(e){} }
  // right pop-out nav — concept queue + learning plan, grouped by plan part (project view only)
  function renderRightNav(){
    const toggle=document.getElementById('rnavToggle'), nav=document.getElementById('rightnav');
    if(viewMode!=='project'){ toggle.style.display='none'; nav.classList.remove('open'); return; }
    toggle.style.display='flex';
    const proj=DATA.projects.find(p=>p.id===viewId);
    const scope=positioned.map(p=>p.c);                 // prereq-closed set, already (level → name) ordered
    const sid=new Set(scope.map(c=>c.id)), baseIdx={}; scope.forEach((c,i)=>baseIdx[c.id]=i);
    // ---- plan parts (optional). partOf harmonised so a prerequisite never lands in a later part than its dependent ----
    const parts=(proj.parts&&proj.parts.length)?proj.parts:null;
    const names=parts?parts.map(p=>p.name):[]; const partOf={};
    if(parts){
      parts.forEach((p,i)=>(p.concepts||[]).forEach(id=>{ if(sid.has(id)&&partOf[id]==null) partOf[id]=i; }));
      for(let pass=0,changed=true; changed&&pass<scope.length+2; pass++){ changed=false;   // pull prereqs no later than dependents
        scope.forEach(c=>{ const pc=partOf[c.id]; if(pc==null)return;
          c.prereqs.forEach(pid=>{ if(sid.has(pid)&&(partOf[pid]==null||partOf[pid]>pc)){ partOf[pid]=pc; changed=true; } }); }); }
      scope.forEach(c=>{ if(partOf[c.id]==null) partOf[c.id]=names.length-1; });           // any leftover → last part
    }
    const pIdx=c=>parts?(partOf[c.id]||0):0;
    // canonical order = part → prerequisite level → name (level/name already baked into `scope`); harmony preserved
    const ord=scope.slice().sort((a,b)=>pIdx(a)-pIdx(b)||baseIdx[a.id]-baseIdx[b.id]);
    const done=ord.filter(c=>statusOf(c)==='mastered').length;
    const pct=ord.length?Math.round(done/ord.length*100):0;
    const row=c=>{ const stx=statusOf(c), sc=avgScore(c.learnedIn);
      const t=(stx==='mastered'||stx==='passed'||stx==='in-progress')&&sc!=null?`<span class="rsc">${sc}/10</span>`:'';
      return `<button class="rrow" data-go="${c.id}"><i style="background:${COLOR[stx]}"></i><span class="rnm">${c.name}</span>${t}</button>`; };
    let body;
    if(!parts){ body=ord.map(row).join(''); }
    else { body='';
      for(let i=0;i<names.length;i++){ const rs=ord.filter(c=>pIdx(c)===i); if(!rs.length)continue;
        const dn=rs.filter(c=>statusOf(c)==='mastered').length, key=viewId+'::'+i, col=partCollapsed.has(key);
        body+=`<div class="rpart-g${col?' collapsed':''}"><button class="rpart" data-pt="${key}"><span class="chev">▾</span>`+
              `<span class="pn">${i+1}. ${names[i]}</span><span class="pc">${dn}/${rs.length}</span></button>`+
              `<div class="rpart-body">${rs.map(row).join('')}</div></div>`; }
    }
    nav.innerHTML=
      `<div class="rnav-head"><span class="t">${proj.name}</span><button class="rnav-x" id="rnavClose" title="Close">✕</button></div>`+
      `<div class="rsec"><h4>Learning plan<span class="cnt">${done}/${ord.length}</span></h4>`+
        `<div class="rbar"><i style="width:${pct}%"></i></div>`+
        `<p class="sub">${parts?'Your plan, part by part — prerequisite-ordered within each. Tap a part to collapse it.':'The full roadmap, in prerequisite order.'}</p>`+
        body+`</div>`;
    document.getElementById('rnavClose').onclick=()=>{nav.classList.remove('open');saveView();};
    nav.querySelectorAll('.rpart').forEach(el=>el.onclick=()=>{ const k=el.dataset.pt;
      if(partCollapsed.has(k)) partCollapsed.delete(k); else partCollapsed.add(k);
      try{localStorage.setItem('pip.partcollapse',JSON.stringify([...partCollapsed]));}catch(e){}
      el.parentElement.classList.toggle('collapsed'); });
    nav.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>{const id=el.dataset.go;select(id);centerOn(id);});
  }
  function bez(x1,y1,x2,y2){const my=(y1+y2)/2;return `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;}

  function draw(){
    const vp=document.getElementById('viewport'); vp.innerHTML='';
    const pos={}; positioned.forEach(p=>pos[p.c.id]=p);
    positioned.forEach(p=>p.c.prereqs.forEach(pid=>{ const from=pos[pid]; if(!from)return;
      const e=document.createElementNS(SVG,'path'); e.setAttribute('d',bez(from.x,from.y+NODE_R,p.x,p.y-NODE_R));
      e.setAttribute('class','edge'); e.dataset.a=pid; e.dataset.b=p.c.id; vp.appendChild(e); }));
    positioned.forEach(p=>{
      const c=p.c, st=statusOf(c), col=COLOR[st];
      const li = viewMode==='project' ? c.learnedIn.find(l=>l.project===viewId) : null;
      const sc = li ? li.score : avgScore(c.learnedIn);   // this-project score in project view, else aggregate
      const node=document.createElementNS(SVG,'g'); node.setAttribute('class','node');
      node.setAttribute('transform',`translate(${p.x},${p.y})`); node.style.color=col; node.dataset.id=c.id;
      const ring=document.createElementNS(SVG,'circle'); ring.setAttribute('r',NODE_R); ring.setAttribute('class','ring');
      ring.setAttribute('fill',col+'22'); ring.setAttribute('stroke',col); node.appendChild(ring);
      const ico=document.createElementNS(SVG,'text'); ico.setAttribute('class','ico'); ico.setAttribute('fill',col);
      ico.textContent= st==='mastered'?'✓': st==='locked'?'⌧': st==='ready'?'–': (sc!=null?fmtScore(sc):'•');
      node.appendChild(ico);
      // shared across PROJECTS — ×N badge, top-right
      if(c.learnedIn.length>1){ const b=document.createElementNS(SVG,'g'); b.setAttribute('class','badge');
        b.setAttribute('transform',`translate(${NODE_R-3},${-NODE_R+3})`);
        const bc=document.createElementNS(SVG,'circle'); bc.setAttribute('r',8); b.appendChild(bc);
        const bt=document.createElementNS(SVG,'text'); bt.textContent='×'+c.learnedIn.length; b.appendChild(bt); node.appendChild(b); }
      // shared across STACKS — ⇄ badge, top-left
      if(c.stacks.length>1){ const b=document.createElementNS(SVG,'g'); b.setAttribute('class','badge sbadge');
        b.setAttribute('transform',`translate(${-NODE_R+3},${-NODE_R+3})`);
        const bc=document.createElementNS(SVG,'circle'); bc.setAttribute('r',8); b.appendChild(bc);
        const bt=document.createElementNS(SVG,'text'); bt.textContent='⇄'; b.appendChild(bt); node.appendChild(b); }
      const lbl=document.createElementNS(SVG,'text'); lbl.setAttribute('class','lbl'); lbl.setAttribute('y',NODE_R+15);
      lbl.textContent=c.name; node.appendChild(lbl);
      if(sc!=null){ const sub=document.createElementNS(SVG,'text'); sub.setAttribute('class','sub'); sub.setAttribute('y',NODE_R+28);
        sub.textContent=fmtScore(sc)+'/10'; node.appendChild(sub); }
      node.onclick=ev=>{ev.stopPropagation();select(c.id);};
      node.onmouseenter=()=>hi(c.id,true); node.onmouseleave=()=>hi(c.id,false);
      vp.appendChild(node);
    });
    applyTransform(); applySel(); applySearch();
  }
  function hi(id,on){ document.querySelectorAll('.edge').forEach(e=>{ if(e.dataset.a===id||e.dataset.b===id)e.classList.toggle('hi',on); }); }

  function select(id){ selected=id; applySel(); openDetail(id); saveView(); }
  function applySel(){ document.querySelectorAll('.node').forEach(n=>n.classList.toggle('sel',n.dataset.id===selected)); }
  function pill(s){ return s!=null?`<span class="gr" style="background:${scoreColor(s)}">${fmtScore(s)}</span>`:`<span class="gr" style="background:#3f3f46;color:#e7e7ea">✓</span>`; }
  function openDetail(id){
    const c=byId[id], st=statusOf(c), s=avgScore(c.learnedIn), col=COLOR[st];
    const stackName=c.stacks.map(sid=>DATA.stacks.find(x=>x.id===sid).name).join(' · ');
    let h=`<div class="dt-top"><span class="dt-dot" style="background:${col}"></span><div>
      <div class="dt-title">${c.name}</div><div class="dt-meta">${stackName} · ${st.replace('-',' ')}</div><div class="chips">`;
    if(isMarked(c)) h+=`<span class="chip grade" style="background:#22c55e">marked mastered</span>`;
    else if(s!=null) h+=`<span class="chip grade" style="background:${scoreColor(s)}">${fmtScore(s)}/10 avg</span>`;
    h+=`<span class="chip">${c.learnedIn.length} project${c.learnedIn.length===1?'':'s'}</span>`;
    if(c.stacks.length>1) h+=`<span class="chip" style="color:#c4b5fd;border-color:rgba(167,139,250,.4)">⇄ shared by ${c.stacks.length} stacks</span>`;
    h+=`</div></div></div>`;
    h+=`<div class="sec"><h4>Learned through</h4>`;
    if(c.learnedIn.length){
      h+=`<div class="prov">`;
      c.learnedIn.slice().sort((a,b)=>(b.score??0)-(a.score??0)).forEach(l=>{
        h+=`<div class="prov-row" data-pj="${l.project}"><span class="pj">${projName[l.project]||l.project}</span>
          ${pill(l.score)}<span class="cd">${l.code||'—'}</span><span class="dt">${l.date||''}</span></div>`; });
      h+=`</div>`;
      if(c.learnedIn.length>1){ const names=c.learnedIn.map(l=>projName[l.project]||l.project).join(', ');
        h+=`<div class="multi">↔ Learned across ${c.learnedIn.length} projects — ${names}${s!=null?`. Aggregate ${fmtScore(s)}/10`:''}.</div>`; }
    } else { h+=`<div class="empty">${isMarked(c)?'Marked mastered by you.':'Not learned yet'+(st==='locked'?' — prerequisites still locked.':' — prerequisites met, ready to start.')}</div>`; }
    h+=`</div>`;
    if(c.prereqs.length){ h+=`<div class="sec"><h4>Prerequisites</h4><div class="prereqs">`;
      c.prereqs.forEach(pid=>{const p=byId[pid]; if(!p)return; h+=`<span class="prq" data-go="${pid}"><i style="background:${COLOR[statusOf(p)]}"></i>${p.name}</span>`;});
      h+=`</div></div>`; }
    if(st!=='mastered' && st!=='locked') h+=`<button class="markbtn" id="markBtn">✓ Mark as mastered</button>`;
    if(userMastered.has(c.id)) h+=`<button class="markbtn unmark" id="unmarkBtn">Undo my mark</button>`;
    const body=document.getElementById('dbody'); body.innerHTML=h;
    body.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>{select(el.dataset.go);centerOn(el.dataset.go);});
    body.querySelectorAll('[data-pj]').forEach(el=>el.onclick=()=>{viewMode='project';viewId=el.dataset.pj;renderSidebar();layout();setTimeout(()=>{select(id);centerOn(id);},30);});
    const mb=document.getElementById('markBtn'); if(mb) mb.onclick=()=>{ userMastered.add(id); saveMarks(); afterMark(id); };
    const ub=document.getElementById('unmarkBtn'); if(ub) ub.onclick=()=>{ userMastered.delete(id); userSynced.delete(id); saveMarks(); afterMark(id); };
    document.getElementById('detail').classList.add('open');
  }
  function afterMark(id){ draw(); renderSidebar(); renderStats(); updateSync(); openDetail(id); }
  function closeDetail(){ document.getElementById('detail').classList.remove('open'); selected=null; applySel(); saveView(); }
  document.getElementById('dx').onclick=closeDetail;

  // pan/zoom
  const svg=document.getElementById('tree'), vp=document.getElementById('viewport');
  function applyTransform(){ vp.setAttribute('transform',`translate(${view.x},${view.y}) scale(${view.k})`); }
  function size(){ const r=svg.getBoundingClientRect(); return {w:r.width,h:r.height}; }
  function fit(){ if(!positioned.length)return; const xs=positioned.map(p=>p.x),ys=positioned.map(p=>p.y);
    const minX=Math.min(...xs)-PAD,maxX=Math.max(...xs)+PAD,minY=Math.min(...ys)-PAD,maxY=Math.max(...ys)+PAD;
    const {w,h}=size(),bw=maxX-minX,bh=maxY-minY,k=Math.min(1.1,Math.min(w/bw,(h-40)/bh));
    view.k=k; view.x=(w-bw*k)/2-minX*k; view.y=24-minY*k; applyTransform(); }
  document.getElementById('zin').onclick=()=>{view.k=Math.min(2.2,view.k*1.2);applyTransform();};
  document.getElementById('zout').onclick=()=>{view.k=Math.max(.3,view.k/1.2);applyTransform();};
  document.getElementById('zfit').onclick=fit;
  function centerOn(id){const p=positioned.find(q=>q.c.id===id);if(!p)return;const {w,h}=size();view.x=w/2-p.x*view.k;view.y=h*0.32-p.y*view.k;applyTransform();}
  let drag=null;
  svg.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y};svg.classList.add('grabbing');});
  window.addEventListener('mousemove',e=>{if(!drag)return;view.x=drag.vx+(e.clientX-drag.x);view.y=drag.vy+(e.clientY-drag.y);applyTransform();});
  window.addEventListener('mouseup',()=>{drag=null;svg.classList.remove('grabbing');});
  svg.addEventListener('wheel',e=>{e.preventDefault();const r=svg.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    const f=e.deltaY<0?1.1:1/1.1,nk=Math.max(.3,Math.min(2.2,view.k*f));
    view.x=mx-(mx-view.x)*(nk/view.k);view.y=my-(my-view.y)*(nk/view.k);view.k=nk;applyTransform();},{passive:false});
  svg.addEventListener('click',()=>{if(selected)closeDetail();});

  // search
  let query='';
  document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();applySearch();});
  function applySearch(){ document.querySelectorAll('.node').forEach(n=>{const c=byId[n.dataset.id];n.classList.toggle('dim',!(!query||c.name.toLowerCase().includes(query)));}); }

  // starfield
  (function(){ const cv=document.getElementById('stars'),ctx=cv.getContext('2d');
    function paint(){const w=cv.width=cv.offsetWidth,h=cv.height=cv.offsetHeight;ctx.clearRect(0,0,w,h);
      for(let i=0;i<90;i++){ctx.fillStyle='rgba(255,255,255,'+(0.04+Math.random()*0.12)+')';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*1.1,0,7);ctx.fill();}}
    paint(); window.addEventListener('resize',()=>{paint();fit();}); })();

  // how-to-use panel
  const HELP=`
    <h1>How to use PIP</h1>
    <p class="lede">PIP rides along while you build. You bring the plan; PIP maps the concepts onto it, then teaches and grades them as you go — so when you ship, you can explain every line in an interview.</p>
    <span class="rule"><b>The one rule:</b> PIP teaches, it never writes your production code. Ask it to build a feature and it teaches the concept, then hands you a prompt to run in your build chat instead.</span>

    <details class="fold">
      <summary class="foldh">How PIP works with you<span class="hint">tap to expand</span></summary>
      <ol class="steps">
        <li><b>Give PIP your plan.</b> Just planned your project in this chat? Call PIP right here — it reads the plan from the conversation, no new chat or paste needed. Or point it at a plan file (<code>/pip-plan plan.md</code>); already mid-build? it reads the repo and infers the plan. PIP works the same in Claude Code, a folder-mounted chat, or your planning chat.</li>
        <li><b>PIP splits the plan into parts and attaches the concepts</b> you'll learn to each part (example below).</li>
        <li><b>You build a part</b> with your AI coding tool, then call <code>/pip-learn</code>. PIP teaches each concept in that part; <code>pip-quiz</code> then asks a checkpoint question and grades it.</li>
        <li><b>It shows up here</b> — the concept turns green under both the project and its stack. After each part, <code>pip-review</code> looks at what you built and folds in anything you used that wasn't planned.</li>
      </ol>
      <div class="plan-eg">
        <div class="pl"><b>Plan:</b> "Build a notes API with auth and full-text search."</div>
        <div class="part"><div class="pn">Part 1 · API skeleton</div><div class="cs"><span class="cpt">FastAPI routing</span><span class="cpt">dependency injection</span><span class="cpt">request validation</span></div></div>
        <div class="part"><div class="pn">Part 2 · Auth</div><div class="cs"><span class="cpt">password hashing</span><span class="cpt">JWT sessions</span></div></div>
        <div class="part"><div class="pn">Part 3 · Search</div><div class="cs"><span class="cpt">full-text indexing</span><span class="cpt">query ranking</span></div></div>
      </div>
      <p class="lede" style="margin-top:10px">Each part of your plan carries the concepts to learn while you build it — so you learn in the same order you ship.</p>
    </details>

    <h3 class="key">Already built some projects? Import them</h3>
    <p class="lede">Call <code>/pip-import</code> on a repo or local folder you've already finished and PIP backfills the concepts you learned there. It can give you a <b>short quiz</b> (through pip-quiz) to set real grades — and passing a concept passes its prerequisites too. Anything unquizzed shows as <b>✓</b> (learned, ungraded) until you checkpoint or revise it.</p>

    <h3 class="key">The skills — how to call PIP</h3>
    <p class="lede">PIP is a set of <b>skills</b>, not terminal commands. Two ways to run one: type <code>/</code> and pick it (e.g. <code>/pip-learn</code>), or just say what you want in plain language ("teach me the next concept") and the matching skill triggers itself. They run wherever you're working — Claude Code, a folder-mounted chat, or your planning chat — as chat messages, never the Python <code>pip</code> package installer. All quizzing lives in <code>pip-quiz</code>; the other skills call it for you.</p>
    <div class="cmd"><div class="c">/pip-plan<em>"plan this with pip" · "what do I need to learn here"</em></div><div class="d">Splits your plan into parts and attaches the concepts you'll learn to each. Point it at a plan file (<code>/pip-plan plan.md</code>), paste a plan, or let it read the repo + <code>git log</code> and infer one.</div></div>
    <div class="cmd"><div class="c">/pip-learn<em>"teach me the next concept"</em></div><div class="d">Teaches one concept against your real code, then hands off to pip-quiz for a checkpoint that scores how well you explained it (out of 10) and records it.</div></div>
    <div class="cmd"><div class="c">/pip-quiz<em>"quiz me on X" · "quiz this project"</em></div><div class="d">The one place quizzing happens — every checkpoint, sampling, and wrap-up runs through it. Rigorous; raises your score if you've improved, never lowers it; pinpoints a weak spot and gives targeted practice. Other skills call it automatically; you can also call it yourself.</div></div>
    <div class="cmd"><div class="c">/pip-review<em>"review this part" · runs automatically</em></div><div class="d">After each part, reviews what you built — any concept you used that wasn't planned gets explained with your own code, added to the tree, and quizzed.</div></div>
    <div class="cmd"><div class="c">/pip-revise<em>"refresh me on X"</em></div><div class="d">A quick refresher on a concept you already know — brief by default, expandable on request. Never lowers a score.</div></div>
    <div class="cmd"><div class="c">/pip-import<em>"add my existing projects"</em></div><div class="d">Backfills concepts from a repo or local folder you've already built. Offers a short quiz (via pip-quiz) to set real grades — pass a concept and its prerequisites pass too; unquizzed ones stay learned (✓).</div></div>
    <div class="cmd"><div class="c">/pip-mark<em>"I already know X" · dashboard button</em></div><div class="d">Marks a concept mastered without a checkpoint, so PIP won't teach it. The dashboard's "Mark as mastered" button feeds this — it gives you a one-line message to paste so the mark sticks across chats.</div></div>
    <div class="cmd"><div class="c">/pip-status<em>"where am I" · "save my progress"</em></div><div class="d">Restates the tree and the next concept to learn (read-only). Ask it to also print a portable snapshot you can paste anywhere.</div></div>
    <div class="cmd"><div class="c">/pip-dashboard<em>"show my projects/stacks"</em></div><div class="d">Regenerates and opens this dashboard from your latest progress.</div></div>

    <h3>Reading this dashboard</h3>
    <div class="grid">
      <div class="tile"><b>Projects</b><p>Click a project to see the concepts you learned building it, with that project's grade per concept.</p></div>
      <div class="tile"><b>Stacks</b><p>Click a stack to see its full curriculum — every concept needed to master it, including what you haven't started.</p></div>
      <div class="tile"><b>Node detail</b><p>Click any node for its status, score, prerequisites, and every project that taught it. Click a "Learned through" row to jump to that project — or <b>Mark as mastered</b> if you already know it.</p></div>
      <div class="tile"><b>Badges</b><p><b>×N</b> (top-right) — learned across N <b>projects</b>. <b>⇄</b> (top-left) — a concept <b>shared across stacks</b>, stored once and shown in each.</p></div>
    </div>
    <p class="lede" style="margin-top:10px">Scores are out of 10: <b>mastered</b> 9–10, <b>passed</b> 6–8, <b>5 or less</b> is still in progress. A prerequisite the project doesn't build is only quizzed lightly and capped at 5 — a modest understanding — until you master it in a project that uses it.</p>
    <div class="legendkey">
      <span><i style="background:#22c55e"></i>mastered (✓, 9–10/10)</span>
      <span><i style="background:#f59e0b"></i>passed (6–8/10)</span>
      <span><i style="background:#38bdf8"></i>in progress (≤5/10)</span>
      <span><i style="background:#52525b"></i>ready (–, prereqs met)</span>
      <span><i style="background:#ef4444"></i>locked (⌧, prereqs unmet)</span>
    </div>
    <p class="lede" style="margin-top:14px">Drag to pan · scroll to zoom · <code>⤢</code> to fit · search filters concepts. <b>Mark as mastered</b> on any unlocked node tells PIP to skip teaching it — copy the sync line it shows so the mark holds in every chat.</p>

    <h3>Where your progress lives</h3>
    <div class="grid">
      <div class="tile"><b><code>.pip/progress.md</code></b><p>Per-repo learning record — plain markdown, safe to commit.</p></div>
      <div class="tile"><b><code>~/.pip/state.json</code></b><p>Cross-project store that powers this dashboard.</p></div>
    </div>
    <p class="lede" style="margin-top:12px">Every checkpoint updates both, then regenerates the dashboard — finish a concept, refresh, and it's green.</p>`;
  document.getElementById('help').innerHTML=HELP;
  document.getElementById('howto').onclick=goHelp;
  document.getElementById('lnavToggle').onclick=()=>{document.querySelector('main').classList.toggle('lcollapse');saveView();};
  document.getElementById('rnavToggle').onclick=()=>{document.getElementById('rightnav').classList.toggle('open');saveView();};

  let syncTimer=null;
  function updateSync(){ const bar=document.getElementById('syncbar');
    const marks=[...userMastered].filter(id=>!userSynced.has(id));     // pending = marked − already-copied
    clearTimeout(syncTimer);
    if(!marks.length){ bar.classList.remove('show'); bar.innerHTML=''; return; }
    const names=marks.map(id=>byId[id].name);
    bar.className='syncbar show';
    bar.innerHTML=`<span>★ ${names.length} new — sync to PIP so it sticks in every chat</span><button id="syncCopy">Copy command</button>`;
    document.getElementById('syncCopy').onclick=()=>{ const cmd='pip mark mastered: '+names.join(', ');
      if(navigator.clipboard) navigator.clipboard.writeText(cmd);
      marks.forEach(id=>userSynced.add(id)); saveMarks();              // copied = "sent"; won't reappear when you mark the next one
      const b=document.getElementById('syncCopy'); b.textContent='Copied ✓ — paste to PIP';
      clearTimeout(syncTimer); syncTimer=setTimeout(()=>bar.classList.remove('show'),1500); };
    const hide=()=>bar.classList.remove('show');
    syncTimer=setTimeout(hide,4000);                                   // auto-dismiss after 4s
    bar.onmouseenter=()=>clearTimeout(syncTimer);                      // pause while hovered so it stays copyable
    bar.onmouseleave=()=>{ clearTimeout(syncTimer); syncTimer=setTimeout(hide,4000); };
  }

  // ---- boot: How-To on a fresh tab; restore the prior view across an auto-refresh so it's seamless ----
  function goHelp(){ viewMode='help'; selected=null; closeDetail();
    document.querySelector('.canvas-wrap').classList.add('mode-help'); renderSidebar();
    document.getElementById('help').scrollTop=0; renderRightNav(); saveView(); }
  renderSidebar(); updateSync();
  (function boot(){
    let o=null; try{o=JSON.parse(sessionStorage.getItem('pip.view')||'null');}catch(e){}
    if(o&&o.l) document.querySelector('main').classList.add('lcollapse');
    const okProj=o&&o.m==='project'&&DATA.projects.some(p=>p.id===o.v);
    const okStack=o&&o.m==='stack'&&DATA.stacks.some(s=>s.id===o.v);
    if(okProj||okStack){ viewMode=o.m; viewId=o.v;
      document.querySelector('.canvas-wrap').classList.remove('mode-help'); renderSidebar(); layout();
      if(okProj&&o.r) document.getElementById('rightnav').classList.add('open');
      if(o.s&&byId[o.s]) setTimeout(()=>{select(o.s);centerOn(o.s);},30);
    } else goHelp();
  })();
  // ---- auto-refresh: reload from disk so PIP-regenerated data appears without a manual refresh ----
  let autoOn = localStorage.getItem('pip.autorefresh')!=='0', autoTimer=null;
  const AUTO_MS=5*60*1000;
  function applyAuto(){ const b=document.getElementById('refreshBtn');
    b.classList.toggle('off',!autoOn); document.getElementById('refreshLbl').textContent=autoOn?'auto 5m':'auto off';
    clearInterval(autoTimer); if(autoOn) autoTimer=setInterval(()=>{ saveView(); location.reload(); }, AUTO_MS); }
  document.getElementById('refreshBtn').onclick=()=>{ autoOn=!autoOn; localStorage.setItem('pip.autorefresh',autoOn?'1':'0'); applyAuto(); };
  applyAuto();
})();
</script>
